syntax = "proto3";

package master_node;

import "google/protobuf/empty.proto";

service MasterNode {
    rpc Heartbeat(google.protobuf.Empty) returns (google.protobuf.Empty);
    rpc RegisterWorker(RegisterWorkerRequest) returns (RegisterWorkerResponse);
    rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse);
    rpc SubmitJob(SubmitJobRequest) returns (SubmitJobResponse);
    rpc GetJobStatus(GetJobStatusRequest) returns (GetJobStatusResponse);
    rpc GetJobResults(GetJobResultsRequest) returns (GetJobResultsResponse);
}

message RegisterWorkerRequest {
    string address = 1;
}
message RegisterWorkerResponse {
    string worker_id = 1;
}

message UpdateStatusRequest {
    string task_id = 1;
    bool success = 2;
    repeated string reduce_keys = 3;
}

message UpdateStatusResponse {
    bool success = 1;
    bool has_task = 2;
    TaskAssignment assignment = 3;
}

message TaskAssignment {
    string task_id = 1;
    TaskKind kind = 2;
    string partition_id = 3;
    repeated string source_worker_ids = 4;
    uint32 num_reduce_tasks = 5;
    int32 reduce_key = 6;
}

enum TaskKind {
    MAP = 0;
    REDUCE = 1;
}

message SubmitJobRequest {
    string task_name = 1;
    string input = 2;
}

message SubmitJobResponse {
    string job_id = 1;
    bool success = 2;
}

message GetJobStatusRequest  {
    string job_id = 1;
}

message GetJobStatusResponse {
    string job_id = 1;
    JobStatus status = 2;
    string error  = 3;
}

enum JobStatus {
    MAPPING = 0;
    REDUCING = 1;
    COMPLETED = 2;
    FAILED = 3;
}

message GetJobResultsRequest  {
    string job_id = 1;
}

message GetJobResultsResponse {
    bool success = 1;
    map<int32, string> results = 2;
}
